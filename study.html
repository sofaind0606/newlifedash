<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDashboard | Study Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --color-primary: #E59B90;
            --color-primary-dark: #c97b6f;
            --color-primary-light: #f7c7bf;
            --color-secondary: #A4A884;
            --color-secondary-dark: #8a8e6c;
            --color-secondary-light: #d0d4b6;
            --color-accent: #620607;
            --color-text: #620607;
            --color-text-light: #8a3a3c;
            --color-text-muted: #b57a7c;
            --color-nav: #E59B90;
            --color-border: #A4A884;
            --color-border-light: #d0d4b6;
            --color-bg: #F9FBED;
            --color-bg-alt: #ffffff;
            
            --color-not-started-bg: #d4e6f1;
            --color-not-started-border: #a9cce3;
            --color-in-progress-bg: #fef9e0;
            --color-in-progress-border: #f9e79f;
            --color-completed-bg: #d5f5e3;
            --color-completed-border: #a9dfbf;
            
            --color-easy: #b0d9b1;
            --color-medium: #f8c7a2;
            --color-hard: #e8a0a0;
            
            --shadow-sm: 0 2px 8px rgba(98, 6, 7, 0.05);
            --shadow-md: 0 4px 15px rgba(98, 6, 7, 0.08);
            --shadow-lg: 0 10px 30px rgba(98, 6, 7, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--color-bg); min-height: 100vh; color: var(--color-text); }
        
        .app-layout { display: flex; min-height: 100vh; }
        .nav-frame {
            width: 18%;
            min-width: 200px;
            background: #E59B90;
            padding: 24px 16px;
            border-right: 2px solid var(--color-primary);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(198, 61, 77, 0.15);
        }
        .logo { margin-bottom: 16px; padding: 12px; border-bottom: 2px solid #ffffff; text-align: center; background: rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .logo h1 { color: #ffffff; font-size: 1.2rem; font-weight: 700; margin: 0; }
        .logo p { color: var(--color-bg); font-size: 0.75rem; margin-top: 2px; opacity: 0.9; }
        .nav-section { margin-bottom: 20px; }
        .nav-title { color: rgba(255,255,255,0.7); font-size: 0.85em; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; padding-left: 8px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: whitesmoke; text-decoration: none; border-radius: var(--radius-md); margin-bottom: 4px; transition: var(--transition); font-weight: 600; }
        .nav-item:hover { background: var(--color-primary); color: #BA494B; transform: translateX(4px); }
        .nav-item.active { background: #BA494B; color: whitesmoke; font-weight: 700; }
        
        .content-area {
            flex: 1;
            margin-left: 18%;
            padding: 24px 32px;
            position: relative;
            min-height: 100vh;
        }
        
        .study-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .study-header h2 {
            font-size: 2em;
            font-weight: 700;
            color: var(--color-text);
        }
        
        .tab-navigation {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--color-border-light);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-light);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }
        .tab-btn.active {
            background: var(--color-primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .tab-btn:hover:not(.active) {
            background: var(--color-primary-light);
            color: var(--color-text);
        }
        
        .add-subject-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-nav) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .add-subject-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        /* Плавающая кнопка добавления задачи (глобальная, с выбором предмета) */
        .fab-add-task {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-nav) 100%);
            color: white;
            border: none;
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .fab-add-task:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(98, 6, 7, 0.2);
        }
        .fab-add-task.hidden {
            display: none;
        }
        
        /* Маленькая кнопка добавления задачи внутри предмета (справа) */
        .inline-add-task-btn {
            background: var(--color-primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .inline-add-task-btn:hover {
            transform: scale(1.05);
            background: var(--color-primary-dark);
        }
        
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .tasks-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--color-text);
        }
        
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .subject-card {
            background: var(--color-bg-alt);
            border-radius: var(--radius-lg);
            border: 2px solid var(--color-border-light);
            padding: 20px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-primary);
        }
        .subject-card.subject-urgent { border-left: 6px solid var(--color-hard); background: var(--color-bg-alt); }
        .subject-card.subject-active { border-left: 6px solid var(--color-primary); background: var(--color-bg-alt); }
        .subject-card.subject-completed { border-left: 6px solid var(--color-easy); background: var(--color-bg-alt); }
        .subject-card.subject-pending { border-left: 6px solid var(--color-secondary); background: var(--color-bg-alt); }
        
        .subject-icon { font-size: 2.5em; margin-bottom: 12px; }
        .subject-title { font-weight: 700; font-size: 1.2em; color: var(--color-text); margin-bottom: 8px; }
        .subject-meta { font-size: 0.8em; color: var(--color-text-light); margin: 8px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .subject-meta span { background: var(--color-bg); padding: 2px 8px; border-radius: 20px; }
        .subject-tasks { font-size: 0.85em; color: var(--color-text-light); margin-top: 8px; }
        .subject-progress { margin-top: 12px; height: 6px; background: var(--color-border-light); border-radius: 3px; overflow: hidden; }
        .subject-progress-fill { height: 100%; background: var(--color-primary); transition: width 0.3s ease; }
        .delete-subject-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--color-hard);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8em;
            opacity: 0;
            transition: var(--transition);
        }
        .subject-card:hover .delete-subject-btn { opacity: 1; }
        .delete-subject-btn:hover { background: #c0392b; }
        
        .pending-full-list {
            background: var(--color-bg-alt);
            border-radius: var(--radius-lg);
            border: 2px solid var(--color-border-light);
            padding: 24px;
        }
        .pending-full-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .pending-full-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--color-text);
        }
        
        .task-item, .task-item-global {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            transition: var(--transition);
            border: none;
            position: relative;
            cursor: pointer;
            border-left-width: 6px;
            border-left-style: solid;
        }
        .task-item:hover, .task-item-global:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }
        
        .task-item.status-not-started, .task-item-global.status-not-started {
            background-color: var(--color-not-started-bg);
            border-left-color: var(--color-not-started-border);
        }
        .task-item.status-in-progress, .task-item-global.status-in-progress {
            background-color: var(--color-in-progress-bg);
            border-left-color: var(--color-in-progress-border);
        }
        .task-item.status-completed, .task-item-global.status-completed {
            background-color: var(--color-completed-bg);
            border-left-color: var(--color-completed-border);
            opacity: 0.85;
        }
        .task-item.status-completed .task-title, .task-item-global.status-completed .task-title {
            text-decoration: line-through;
        }
        
        .task-item.difficulty-easy, .task-item-global.difficulty-easy {
            border-left: 6px solid var(--color-easy);
        }
        .task-item.difficulty-medium, .task-item-global.difficulty-medium {
            border-left: 6px solid var(--color-medium);
        }
        .task-item.difficulty-hard, .task-item-global.difficulty-hard {
            border-left: 6px solid var(--color-hard);
        }
        
        .task-btn.delete {
            background: var(--color-hard);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8em;
            transition: var(--transition);
        }
        .task-btn.delete:hover {
            transform: scale(1.05);
            background: #c0392b;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }
        .task-content {
            flex: 1;
        }
        .task-title {
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        .task-meta {
            font-size: 0.8em;
            color: var(--color-text-light);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .task-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .badge-deadline { background: var(--color-hard); color: white; }
        
        .subject-details {
            background: var(--color-primary-light);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 0.9em;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .subject-details span { background: white; padding: 4px 12px; border-radius: 20px; }
        
        .status-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-filter-btn {
            padding: 8px 16px;
            background: var(--color-bg-alt);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: var(--transition);
        }
        .status-filter-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        
        .empty-state {
            color: var(--color-text-light);
            background: var(--color-primary-light);
            border: 2px dashed var(--color-border);
            padding: 30px;
            border-radius: var(--radius-lg);
            text-align: center;
            font-weight: 500;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(198, 61, 77, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: var(--radius-xl);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            border: 2px solid var(--color-border);
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--color-border);
        }
        .modal-header h3 {
            color: var(--color-primary);
            font-weight: 700;
            margin: 0;
            font-size: 1.3em;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.6em;
            cursor: pointer;
            color: var(--color-primary);
            padding: 0;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-primary);
            font-size: 0.9em;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.95em;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(229, 155, 144, 0.2);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-nav) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1em;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        @media (max-width: 1024px) {
            .app-layout { flex-direction: column; }
            .nav-frame { width: 100%; height: auto; position: relative; }
            .content-area { margin-left: 0; }
            .fab-add-task { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <nav class="nav-frame">
        <div class="logo"><h1>📅 LifeDashboard</h1><p>Complete Productivity Suite</p></div>
        <div class="nav-section"><div class="nav-title">MAIN</div><a href="index.html" class="nav-item">🏠 Home</a><a href="day.html" class="nav-item">📆 Day Planner</a></div>
        <div class="nav-section"><div class="nav-title">PLANNING</div><a href="week.html" class="nav-item">📋 Week Planner</a><a href="month.html" class="nav-item">🗓️ Month Calendar</a><a href="year.html" class="nav-item">🎯 Year Goals</a></div>
        <div class="nav-section"><div class="nav-title">TRACKERS</div><a href="habits.html" class="nav-item">🔥 Habit Tracker</a><a href="finance.html" class="nav-item">💰 Finance Tracker</a><a href="media.html" class="nav-item">📚🎬 Books & Movies</a><a href="study.html" class="nav-item active">📚 Study Tracker</a><a href="pomodoro.html" class="nav-item">🍅 Pomodoro Timer</a></div>
    </nav>

    <div class="content-area">
        <div class="study-header">
            <h2>📚 Study Tasks</h2>
            <button class="add-subject-btn" onclick="openSubjectModal()">➕ Add Subject</button>
        </div>

        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="subjects" onclick="switchTab('subjects')">📚 Subjects</button>
            <button class="tab-btn" data-tab="pending" onclick="switchTab('pending')">📋 Pending Tasks</button>
        </div>

        <div id="subjectsContainer" class="subjects-grid"></div>

        <div id="pendingContainer" class="pending-full-list" style="display: none;">
            <div class="pending-full-header">
                <div class="pending-full-title">📋 All Pending Tasks</div>
            </div>
            <div id="globalPendingTasksList"></div>
        </div>

        <div id="tasksSection" class="tasks-section" style="display:none;">
            <div class="tasks-header">
                <div class="tasks-title" id="subjectTitle"></div>
                <button class="inline-add-task-btn" onclick="openTaskModal()" title="Add task to this subject">+</button>
            </div>
            <div id="subjectDetailsPanel" class="subject-details"></div>
            <div class="status-filter">
                <button class="status-filter-btn all active" onclick="filterTasks('all')">All</button>
                <button class="status-filter-btn not-started" onclick="filterTasks('not-started')">Not Started</button>
                <button class="status-filter-btn in-progress" onclick="filterTasks('in-progress')">In Progress</button>
                <button class="status-filter-btn completed" onclick="filterTasks('completed')">Completed</button>
            </div>
            <div id="tasksList"></div>
            <button onclick="closeTasksSection()" style="margin-top:20px;padding:10px 20px;background:var(--color-bg);border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;font-weight:600;">← Back to Subjects</button>
        </div>
    </div>
</div>

<!-- Плавающая кнопка добавления задачи (глобальная, с выбором предмета) -->
<button class="fab-add-task" onclick="openGlobalTaskModal()">+</button>

<!-- Subject Modal -->
<div id="subjectModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="subjectModalTitle">➕ Add Subject</h3>
            <button class="close-modal" onclick="closeSubjectModal()">✖</button>
        </div>
        <div class="form-group">
            <label>Subject Name</label>
            <input type="text" id="subjectName" placeholder="e.g., Mathematics">
        </div>
        <div class="form-group">
            <label>Icon</label>
            <select id="subjectIcon">
                <option value="📚">📚 Books</option><option value="📐">📐 Math</option><option value="🔬">🔬 Science</option>
                <option value="💻">💻 Computer</option><option value="📝">📝 Writing</option><option value="🎨">🎨 Art</option>
                <option value="🌍">🌍 Geography</option><option value="📜">📜 History</option><option value="🔤">🔤 Language</option>
                <option value="🎵">🎵 Music</option>
            </select>
        </div>
        <div class="form-group">
            <label>Exam Type</label>
            <select id="subjectExamType">
                <option value="">Not selected</option>
                <option value="credit">Credit</option>
                <option value="exam">Exam</option>
            </select>
        </div>
        <div class="form-group">
            <label>Teacher Name</label>
            <input type="text" id="subjectTeacher" placeholder="Ivanov I.I.">
        </div>
        <div class="form-group">
            <label>Comment / Note</label>
            <textarea id="subjectComment" rows="3" placeholder="Any notes about the subject..."></textarea>
        </div>
        <button class="save-btn" onclick="saveSubject()">💾 Save</button>
    </div>
</div>

<!-- Task Modal для добавления/редактирования задачи внутри предмета (без выбора предмета) -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="taskModalTitle">➕ Add Task</h3>
            <button class="close-modal" onclick="closeTaskModal()">✖</button>
        </div>
        <div class="form-group">
            <label>Task Title</label>
            <input type="text" id="taskTitle" placeholder="e.g., Complete Chapter 5">
        </div>
        <div class="form-row">
            <div class="form-group"><label>Difficulty</label><select id="taskDifficulty"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></div>
            <div class="form-group"><label>Status</label><select id="taskStatus"><option value="not-started">Not Started</option><option value="in-progress">In Progress</option><option value="completed">Completed</option></select></div>
        </div>
        <div class="form-group"><label>Deadline</label><input type="date" id="taskDeadline"></div>
        <div class="form-group"><label>Notes</label><textarea id="taskNotes" rows="3"></textarea></div>
        <button class="save-btn" onclick="saveTask()">💾 Save</button>
    </div>
</div>

<!-- Global Task Modal (с выбором предмета) -->
<div id="globalTaskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ New Task</h3>
            <button class="close-modal" onclick="closeGlobalTaskModal()">✖</button>
        </div>
        <div class="form-group">
            <label>Task Title</label>
            <input type="text" id="globalTaskTitle" placeholder="e.g., Prepare for exam">
        </div>
        <div class="form-group">
            <label>Subject</label>
            <select id="globalTaskSubjectId"></select>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Difficulty</label><select id="globalTaskDifficulty"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></div>
            <div class="form-group"><label>Status</label><select id="globalTaskStatus"><option value="not-started">Not Started</option><option value="in-progress">In Progress</option><option value="completed">Completed</option></select></div>
        </div>
        <div class="form-group"><label>Deadline</label><input type="date" id="globalTaskDeadline"></div>
        <div class="form-group"><label>Notes</label><textarea id="globalTaskNotes" rows="3"></textarea></div>
        <button class="save-btn" onclick="saveGlobalTask()">💾 Save</button>
    </div>
</div>

<script>
    let studyData = JSON.parse(localStorage.getItem('studyData')) || { subjects: [] };
    let currentSubjectId = null;
    let currentFilter = 'all';
    let editingSubjectId = null;
    let editingTaskId = null;
    let currentTab = 'subjects';
    let firebaseReady = false;
    let db = null;
    let currentUser = null;
    
    const firebaseConfig = { apiKey: "AIzaSyARKWwV3cggOhda9g6cDNcEAGOpUN4O63I", authDomain: "lifedashbord.firebaseapp.com", projectId: "lifedashbord", storageBucket: "lifedashbord.appspot.com", messagingSenderId: "206574362724", appId: "1:206574362724:web:83887cae4dc87b41137f71" };
    
    document.addEventListener('DOMContentLoaded', function() { initFirebase(); renderAll(); });
    
    function initFirebase() {
        try {
            if (typeof firebase === 'undefined') return;
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            var auth = firebase.auth();
            auth.onAuthStateChanged(function(user) {
                if (user) { currentUser = user; firebaseReady = true; loadStudyData(); }
                else { firebaseReady = false; }
            });
        } catch(e) {}
    }
    
    function loadStudyData() {
        if (!currentUser || !db) return;
        db.collection('users').doc(currentUser.uid).collection('study').doc('data').get().then(doc => {
            if (doc.exists && JSON.stringify(studyData) !== JSON.stringify(doc.data())) {
                studyData = doc.data();
                localStorage.setItem('studyData', JSON.stringify(studyData));
                renderAll();
            }
        });
    }
    
    function saveStudyData() {
        localStorage.setItem('studyData', JSON.stringify(studyData));
        if (firebaseReady && currentUser && db) db.collection('users').doc(currentUser.uid).collection('study').doc('data').set(studyData);
    }
    
    function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function formatDate(dateStr) { if (!dateStr) return ''; return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
    
    function getSubjectProgress(subject) {
        if (!subject.tasks?.length) return 0;
        const completed = subject.tasks.filter(t => t.status === 'completed').length;
        return Math.round((completed / subject.tasks.length) * 100);
    }
    
    function getSubjectCardClass(subject) {
        if (!subject.tasks || subject.tasks.length === 0) return '';
        const now = new Date();
        const threeDaysLater = new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000);
        let hasUrgent = false;
        let hasInProgress = false;
        let allCompleted = true;
        for (let task of subject.tasks) {
            if (task.status !== 'completed') allCompleted = false;
            if (task.status !== 'completed' && task.deadline) {
                const deadlineDate = new Date(task.deadline);
                if (deadlineDate <= threeDaysLater && deadlineDate >= now) hasUrgent = true;
                if (task.status === 'in-progress') hasInProgress = true;
            } else if (task.status === 'in-progress') hasInProgress = true;
        }
        if (hasUrgent) return 'subject-urgent';
        if (hasInProgress) return 'subject-active';
        if (allCompleted && subject.tasks.length > 0) return 'subject-completed';
        return 'subject-pending';
    }
    
    function renderSubjects() {
        const container = document.getElementById('subjectsContainer');
        if (!studyData.subjects?.length) {
            container.innerHTML = '<div class="empty-state"><p>No subjects yet. Click "Add Subject" to create your first subject!</p></div>';
            return;
        }
        container.innerHTML = '';
        studyData.subjects.forEach(subject => {
            const progress = getSubjectProgress(subject);
            const taskCount = subject.tasks?.length || 0;
            const cardClass = getSubjectCardClass(subject);
            const examTypeText = subject.examType === 'credit' ? '📘 Credit' : (subject.examType === 'exam' ? '📝 Exam' : '');
            const teacherText = subject.teacher ? `👨‍🏫 ${escapeHtml(subject.teacher)}` : '';
            const commentPreview = subject.comment ? (subject.comment.length > 40 ? subject.comment.substring(0,40)+'…' : subject.comment) : '';
            const card = document.createElement('div');
            card.className = `subject-card ${cardClass}`;
            card.innerHTML = `
                <button class="delete-subject-btn" onclick="deleteSubject('${subject.id}', event)">✖</button>
                <div class="subject-icon">${subject.icon || '📚'}</div>
                <div class="subject-title">${escapeHtml(subject.name)}</div>
                <div class="subject-meta">
                    ${examTypeText ? `<span>${examTypeText}</span>` : ''}
                    ${teacherText ? `<span>${teacherText}</span>` : ''}
                    ${commentPreview ? `<span>💬 ${escapeHtml(commentPreview)}</span>` : ''}
                </div>
                <div class="subject-tasks">📌 ${taskCount} tasks</div>
                <div class="subject-progress"><div class="subject-progress-fill" style="width: ${progress}%"></div></div>
            `;
            card.onclick = e => { if (!e.target.classList.contains('delete-subject-btn')) openSubjectTasks(subject.id); };
            container.appendChild(card);
        });
    }
    
    function sortTasks(tasks) {
        const notCompleted = tasks.filter(t => t.status !== 'completed');
        const completed = tasks.filter(t => t.status === 'completed');
        const withDeadline = notCompleted.filter(t => t.deadline);
        const withoutDeadline = notCompleted.filter(t => !t.deadline);
        withDeadline.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
        completed.sort((a, b) => {
            if (a.deadline && b.deadline) return new Date(a.deadline) - new Date(b.deadline);
            if (a.deadline) return -1;
            if (b.deadline) return 1;
            return 0;
        });
        return [...withDeadline, ...withoutDeadline, ...completed];
    }
    
    function renderGlobalPendingTasks() {
        const container = document.getElementById('globalPendingTasksList');
        const allTasks = [];
        studyData.subjects.forEach(subject => {
            (subject.tasks || []).forEach(task => {
                if (task.status !== 'completed') {
                    allTasks.push({ ...task, subjectName: subject.name, subjectId: subject.id });
                }
            });
        });
        const withDeadline = allTasks.filter(t => t.deadline);
        const withoutDeadline = allTasks.filter(t => !t.deadline);
        withDeadline.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
        const sorted = [...withDeadline, ...withoutDeadline];
        
        if (sorted.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>✨ No pending tasks. Take a rest or add a new task!</p></div>';
            return;
        }
        container.innerHTML = '';
        sorted.forEach(task => {
            const difficultyClass = `difficulty-${task.difficulty || 'medium'}`;
            const item = document.createElement('div');
            item.className = `task-item-global status-${task.status || 'not-started'} ${difficultyClass}`;
            const deadlineHtml = task.deadline ? `<span class="task-badge badge-deadline">📅 ${formatDate(task.deadline)}</span>` : '';
            item.innerHTML = `
                <input type="checkbox" class="task-checkbox" ${task.status === 'completed' ? 'checked' : ''} onchange="toggleGlobalTaskStatus('${task.id}', '${task.subjectId}', this.checked)">
                <div class="task-content">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        <span class="task-subject-badge">📘 ${escapeHtml(task.subjectName)}</span>
                        ${deadlineHtml}
                        ${task.notes ? `<span>📝 ${escapeHtml(task.notes).substring(0, 50)}${task.notes.length>50?'...':''}</span>` : ''}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="task-btn delete" onclick="event.stopPropagation(); deleteGlobalTask('${task.id}', '${task.subjectId}')">🗑️</button>
                </div>
            `;
            item.onclick = (e) => {
                if (!e.target.classList.contains('task-checkbox') && !e.target.classList.contains('delete')) {
                    editGlobalTask(task.id, task.subjectId);
                }
            };
            container.appendChild(item);
        });
    }
    
    function openSubjectTasks(subjectId) {
        currentSubjectId = subjectId;
        currentFilter = 'all';
        const subject = studyData.subjects.find(s => s.id === subjectId);
        if (!subject) return;
        document.getElementById('subjectTitle').innerHTML = subject.icon + ' ' + escapeHtml(subject.name);
        const detailsPanel = document.getElementById('subjectDetailsPanel');
        const examTypeText = subject.examType === 'credit' ? '📘 Credit' : (subject.examType === 'exam' ? '📝 Exam' : '');
        detailsPanel.innerHTML = `
            ${examTypeText ? `<span>${examTypeText}</span>` : ''}
            ${subject.teacher ? `<span>👨‍🏫 ${escapeHtml(subject.teacher)}</span>` : ''}
            ${subject.comment ? `<span>💬 ${escapeHtml(subject.comment)}</span>` : ''}
        `;
        document.getElementById('subjectsContainer').style.display = 'none';
        document.getElementById('pendingContainer').style.display = 'none';
        document.getElementById('tasksSection').style.display = 'block';
        updateFilterButtons();
        renderTasks();
        // Скрываем плавающую глобальную кнопку
        document.querySelector('.fab-add-task').classList.add('hidden');
    }
    
    function closeTasksSection() {
        currentSubjectId = null;
        document.getElementById('tasksSection').style.display = 'none';
        if (currentTab === 'subjects') {
            document.getElementById('subjectsContainer').style.display = 'grid';
            document.getElementById('pendingContainer').style.display = 'none';
        } else {
            document.getElementById('subjectsContainer').style.display = 'none';
            document.getElementById('pendingContainer').style.display = 'block';
            renderGlobalPendingTasks();
        }
        renderSubjects();
        // Показываем плавающую кнопку, если мы не в режиме предмета
        document.querySelector('.fab-add-task').classList.remove('hidden');
    }
    
    function renderTasks() {
        const list = document.getElementById('tasksList');
        const subject = studyData.subjects.find(s => s.id === currentSubjectId);
        if (!subject) return;
        let tasks = subject.tasks || [];
        if (currentFilter !== 'all') tasks = tasks.filter(t => t.status === currentFilter);
        const sortedTasks = sortTasks(tasks);
        if (sortedTasks.length === 0) { list.innerHTML = '<div class="empty-state"><p>No tasks in this category</p></div>'; return; }
        list.innerHTML = '';
        sortedTasks.forEach(task => {
            const difficultyClass = `difficulty-${task.difficulty || 'medium'}`;
            const item = document.createElement('div');
            item.className = `task-item status-${task.status || 'not-started'} ${difficultyClass}`;
            const deadlineHtml = task.deadline ? `<span class="task-badge badge-deadline">📅 ${formatDate(task.deadline)}</span>` : '';
            item.innerHTML = `
                <input type="checkbox" class="task-checkbox" ${task.status === 'completed' ? 'checked' : ''} onchange="toggleTaskStatus('${task.id}', this.checked)">
                <div class="task-content">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        ${deadlineHtml}
                        ${task.notes ? `<span>📝 ${escapeHtml(task.notes).substring(0,50)}${task.notes.length>50?'...':''}</span>` : ''}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="task-btn delete" onclick="event.stopPropagation(); deleteTask('${task.id}')">🗑️</button>
                </div>
            `;
            item.onclick = (e) => {
                if (!e.target.classList.contains('task-checkbox') && !e.target.classList.contains('delete')) {
                    editTask(task.id);
                }
            };
            list.appendChild(item);
        });
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
        if (tab === 'subjects') {
            document.getElementById('subjectsContainer').style.display = 'grid';
            document.getElementById('pendingContainer').style.display = 'none';
            renderSubjects();
        } else {
            document.getElementById('subjectsContainer').style.display = 'none';
            document.getElementById('pendingContainer').style.display = 'block';
            renderGlobalPendingTasks();
        }
        if (document.getElementById('tasksSection').style.display === 'block') {
            closeTasksSection();
        }
        // При переключении вкладки показываем плавающую кнопку, если не открыт предмет
        if (!currentSubjectId) {
            document.querySelector('.fab-add-task').classList.remove('hidden');
        }
    }
    
    // Global task operations (с выбором предмета)
    window.openGlobalTaskModal = function() {
        const select = document.getElementById('globalTaskSubjectId');
        select.innerHTML = '<option value="">-- Select subject --</option>';
        studyData.subjects.forEach(subj => {
            select.innerHTML += `<option value="${subj.id}">${escapeHtml(subj.name)}</option>`;
        });
        document.getElementById('globalTaskTitle').value = '';
        document.getElementById('globalTaskDifficulty').value = 'medium';
        document.getElementById('globalTaskStatus').value = 'not-started';
        document.getElementById('globalTaskDeadline').value = '';
        document.getElementById('globalTaskNotes').value = '';
        document.getElementById('globalTaskModal').classList.add('active');
        window._editingGlobalTask = null;
    };
    window.closeGlobalTaskModal = () => document.getElementById('globalTaskModal').classList.remove('active');
    window.saveGlobalTask = function() {
        const subjectId = document.getElementById('globalTaskSubjectId').value;
        const title = document.getElementById('globalTaskTitle').value.trim();
        if (!subjectId || !title) return;
        const subject = studyData.subjects.find(s => s.id === subjectId);
        if (!subject) return;
        if (!subject.tasks) subject.tasks = [];
        if (window._editingGlobalTask) {
            const oldSubject = studyData.subjects.find(s => s.id === window._editingGlobalTask.subjectId);
            if (oldSubject && oldSubject.tasks) oldSubject.tasks = oldSubject.tasks.filter(t => t.id !== window._editingGlobalTask.taskId);
            subject.tasks.push({
                id: window._editingGlobalTask.taskId,
                title: title,
                difficulty: document.getElementById('globalTaskDifficulty').value,
                status: document.getElementById('globalTaskStatus').value,
                deadline: document.getElementById('globalTaskDeadline').value,
                notes: document.getElementById('globalTaskNotes').value.trim(),
                createdAt: new Date().toISOString()
            });
            window._editingGlobalTask = null;
        } else {
            subject.tasks.push({
                id: generateId(),
                title: title,
                difficulty: document.getElementById('globalTaskDifficulty').value,
                status: document.getElementById('globalTaskStatus').value,
                deadline: document.getElementById('globalTaskDeadline').value,
                notes: document.getElementById('globalTaskNotes').value.trim(),
                createdAt: new Date().toISOString()
            });
        }
        saveStudyData();
        closeGlobalTaskModal();
        renderAll();
        if (currentSubjectId === subjectId) renderTasks();
    };
    window.toggleGlobalTaskStatus = function(taskId, subjectId, completed) {
        const subject = studyData.subjects.find(s => s.id === subjectId);
        if (!subject) return;
        const task = subject.tasks.find(t => t.id === taskId);
        if (task) task.status = completed ? 'completed' : 'in-progress';
        saveStudyData();
        renderAll();
        if (currentSubjectId === subjectId) renderTasks();
    };
    window.editGlobalTask = function(taskId, subjectId) {
        const subject = studyData.subjects.find(s => s.id === subjectId);
        if (!subject) return;
        const task = subject.tasks.find(t => t.id === taskId);
        if (!task) return;
        const select = document.getElementById('globalTaskSubjectId');
        select.innerHTML = '';
        studyData.subjects.forEach(subj => {
            const selected = subj.id === subjectId ? 'selected' : '';
            select.innerHTML += `<option value="${subj.id}" ${selected}>${escapeHtml(subj.name)}</option>`;
        });
        document.getElementById('globalTaskTitle').value = task.title;
        document.getElementById('globalTaskDifficulty').value = task.difficulty || 'medium';
        document.getElementById('globalTaskStatus').value = task.status || 'not-started';
        document.getElementById('globalTaskDeadline').value = task.deadline || '';
        document.getElementById('globalTaskNotes').value = task.notes || '';
        window._editingGlobalTask = { taskId, subjectId };
        document.getElementById('globalTaskModal').classList.add('active');
    };
    window.deleteGlobalTask = function(taskId, subjectId) {
        const subject = studyData.subjects.find(s => s.id === subjectId);
        if (subject && subject.tasks) subject.tasks = subject.tasks.filter(t => t.id !== taskId);
        saveStudyData();
        renderAll();
        if (currentSubjectId === subjectId) renderTasks();
    };
    
    // Subject-specific task operations (без выбора предмета, привязаны к currentSubjectId)
    window.openTaskModal = function() {
        if (!currentSubjectId) return;
        editingTaskId = null;
        document.getElementById('taskModalTitle').innerText = '➕ Add Task';
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDifficulty').value = 'medium';
        document.getElementById('taskStatus').value = 'not-started';
        document.getElementById('taskDeadline').value = '';
        document.getElementById('taskNotes').value = '';
        document.getElementById('taskModal').classList.add('active');
    };
    window.closeTaskModal = () => { document.getElementById('taskModal').classList.remove('active'); editingTaskId = null; };
    window.saveTask = function() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) return;
        const subject = studyData.subjects.find(s => s.id === currentSubjectId);
        if (!subject) return;
        if (!subject.tasks) subject.tasks = [];
        if (editingTaskId) {
            const task = subject.tasks.find(t => t.id === editingTaskId);
            if (task) { task.title = title; task.difficulty = document.getElementById('taskDifficulty').value; task.status = document.getElementById('taskStatus').value; task.deadline = document.getElementById('taskDeadline').value; task.notes = document.getElementById('taskNotes').value.trim(); }
        } else {
            subject.tasks.push({ id: generateId(), title, difficulty: document.getElementById('taskDifficulty').value, status: document.getElementById('taskStatus').value, deadline: document.getElementById('taskDeadline').value, notes: document.getElementById('taskNotes').value.trim(), createdAt: new Date().toISOString() });
        }
        saveStudyData();
        closeTaskModal();
        renderTasks();
        renderAll();
        editingTaskId = null;
    };
    window.toggleTaskStatus = function(taskId, completed) {
        const subject = studyData.subjects.find(s => s.id === currentSubjectId);
        if (!subject) return;
        const task = subject.tasks.find(t => t.id === taskId);
        if (task) task.status = completed ? 'completed' : 'in-progress';
        saveStudyData();
        renderTasks();
        renderAll();
    };
    window.editTask = function(taskId) {
        const subject = studyData.subjects.find(s => s.id === currentSubjectId);
        if (!subject) return;
        const task = subject.tasks.find(t => t.id === taskId);
        if (!task) return;
        editingTaskId = taskId;
        document.getElementById('taskModalTitle').innerText = '✏️ Edit Task';
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDifficulty').value = task.difficulty || 'medium';
        document.getElementById('taskStatus').value = task.status || 'not-started';
        document.getElementById('taskDeadline').value = task.deadline || '';
        document.getElementById('taskNotes').value = task.notes || '';
        document.getElementById('taskModal').classList.add('active');
    };
    window.deleteTask = function(taskId) {
        const subject = studyData.subjects.find(s => s.id === currentSubjectId);
        if (subject && subject.tasks) subject.tasks = subject.tasks.filter(t => t.id !== taskId);
        saveStudyData();
        renderTasks();
        renderAll();
    };
    
    window.filterTasks = function(filter) { currentFilter = filter; updateFilterButtons(); renderTasks(); };
    function updateFilterButtons() {
        document.querySelectorAll('.status-filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if ((currentFilter === 'all' && btn.classList.contains('all')) || btn.classList.contains(currentFilter)) btn.classList.add('active');
        });
    }
    
    // Subject CRUD
    window.openSubjectModal = function() { editingSubjectId = null; document.getElementById('subjectModalTitle').innerText = '➕ Add Subject'; document.getElementById('subjectName').value = ''; document.getElementById('subjectIcon').value = '📚'; document.getElementById('subjectExamType').value = ''; document.getElementById('subjectTeacher').value = ''; document.getElementById('subjectComment').value = ''; document.getElementById('subjectModal').classList.add('active'); };
    window.closeSubjectModal = () => document.getElementById('subjectModal').classList.remove('active');
    window.saveSubject = function() {
        const name = document.getElementById('subjectName').value.trim();
        if (!name) return;
        if (!studyData.subjects) studyData.subjects = [];
        if (editingSubjectId) {
            const subj = studyData.subjects.find(s => s.id === editingSubjectId);
            if (subj) { subj.name = name; subj.icon = document.getElementById('subjectIcon').value; subj.examType = document.getElementById('subjectExamType').value; subj.teacher = document.getElementById('subjectTeacher').value.trim(); subj.comment = document.getElementById('subjectComment').value.trim(); }
        } else {
            studyData.subjects.push({ id: generateId(), name, icon: document.getElementById('subjectIcon').value, examType: document.getElementById('subjectExamType').value, teacher: document.getElementById('subjectTeacher').value.trim(), comment: document.getElementById('subjectComment').value.trim(), tasks: [] });
        }
        saveStudyData();
        closeSubjectModal();
        renderAll();
    };
    window.deleteSubject = function(subjectId, event) { event.stopPropagation(); studyData.subjects = studyData.subjects.filter(s => s.id !== subjectId); saveStudyData(); renderAll(); if (currentSubjectId === subjectId) closeTasksSection(); };
    
    function renderAll() {
        renderSubjects();
        if (currentTab === 'pending') renderGlobalPendingTasks();
        if (currentSubjectId) renderTasks();
    }
    
    window.switchTab = switchTab;
</script>
</body>
</html>
