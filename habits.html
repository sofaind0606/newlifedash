<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDashboard | Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --color-primary: #E59B90; --color-primary-dark: #c97b6f; --color-primary-light: #f7c7bf; --color-secondary: #A4A884; --color-secondary-dark: #8a8e6c; --color-secondary-light: #d0d4b6; --color-accent: #620607; --color-text: #620607; --color-text-light: #8a3a3c; --color-text-muted: #b57a7c; --color-nav: #E59B90; --color-nav-light: #D18B80; --color-border: #A4A884; --color-border-light: #d0d4b6; --color-bg: #F9FBED; --color-bg-alt: #ffffff; --shadow-sm: 0 2px 8px rgba(98, 6, 7, 0.05); --shadow-md: 0 4px 15px rgba(98, 6, 7, 0.08); --shadow-lg: 0 10px 30px rgba(98, 6, 7, 0.12); --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--color-bg); min-height: 100vh; color: var(--color-text); }
        
        /* ✅ Глобальное отключение горизонтального скролла для всей страницы — ползунок ТОЛЬКО внутри таблицы */
        html, body {
            overflow-x: hidden;
        }
        
        .app-layout { 
            display: flex; 
            min-height: 100vh;
            overflow-x: hidden;  /* ✅ родительский контейнер не двигается */
        }
        
        .nav-frame {
            width: 18%;
            min-width: 200px;
            background: #E59B90;
            padding: 24px 16px;
            border-right: 2px solid var(--color-primary);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(198, 61, 77, 0.15);
        }
        .logo { margin-bottom: 16px; padding: 12px; border-bottom: 2px solid #ffffff; text-align: center; background: rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .logo h1 { color: #ffffff; font-size: 1.2rem; font-weight: 700; margin: 0; }
        .logo p { color: var(--color-bg); font-size: 0.75rem; margin-top: 2px; opacity: 0.9; }
        .nav-section { margin-bottom: 20px; }
        .nav-title { color: var(--color-primary-light); font-size: 0.85em; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; padding-left: 8px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: whitesmoke; text-decoration: none; border-radius: var(--radius-md); margin-bottom: 4px; transition: var(--transition); font-weight: 600; border: 1px solid transparent; font-size: 1.1rem; }
        .nav-item:hover { background: var(--color-primary); color: #BA494B; transform: translateX(4px); }
        .nav-item.active { background: #BA494B; color: whitesmoke; font-weight: 700; box-shadow: var(--shadow-md); }
        
        .content-area { 
            flex: 1; 
            margin-left: 18%; 
            padding: 24px 32px;
            overflow-x: hidden;   /* ✅ контентная область не скроллится по горизонтали */
        }
        
        .card { background: var(--color-bg-alt); border-radius: var(--radius-lg); padding: 24px; border: 2px solid var(--color-border); box-shadow: var(--shadow-sm); margin-bottom: 24px; transition: var(--transition); }
        .card:hover { box-shadow: var(--shadow-md); border-color: var(--color-primary); }
        .card h2 { color: var(--color-nav); font-size: 1.4em; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--color-border); font-weight: 700; }
        
        .date-range-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border-light);
            flex-wrap: wrap;
            align-items: center;
        }
        .date-range-selector label {
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.9em;
        }
        .date-range-selector input[type="date"] {
            padding: 8px 12px;
            background: white;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.9em;
            color: var(--color-text);
        }
        .date-range-selector button {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-nav) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9em;
        }
        .date-range-selector button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .stats-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-mini-card {
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-bg-alt) 100%);
            border-radius: var(--radius-md);
            padding: 12px;
            border: 1px solid var(--color-border);
            text-align: center;
        }
        .stat-mini-icon { font-size: 1.5em; margin-bottom: 4px; }
        .stat-mini-value { font-size: 1.3em; font-weight: 700; color: var(--color-text); }
        .stat-mini-label { font-size: 0.75em; color: var(--color-text-light); font-weight: 500; }
        
        .habit-actions-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-nav) 100%);
            color: white;
        }
        .action-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        /* ✅ КОНТЕЙНЕР ТАБЛИЦЫ: ТОЛЬКО ЗДЕСЬ ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ (ползунок) */
        .habit-table-container {
            overflow-x: auto;      /* ✅ ползунок ТОЛЬКО для таблицы */
            overflow-y: visible;
            width: 100%;
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            background: white;
            /* предотвращаем любые вылезания за пределы родителя */
            max-width: 100%;
        }
        
        .habit-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px; /* ✅ обеспечивает горизонтальный скролл при необходимости */
        }
        
        .habit-table th, .habit-table td {
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--color-border-light);
        }
        
        .habit-table th {
            background: var(--color-primary);
            color: white;
            font-weight: 600;
            font-size: 0.85em;
        }
        
        .habit-table td {
            background: var(--color-bg-alt);
            font-size: 0.9em;
        }
        
        .habit-table tr:hover td {
            background: var(--color-primary-light);
        }
        
        /* ✅ ЗАКРЕПЛЁННЫЙ ПЕРВЫЙ СТОЛБЕЦ (НАЗВАНИЯ ПРИВЫЧЕК) ВСЕГДА ВИДИМ ПРИ ГОРИЗОНТАЛЬНОМ СКРОЛЛЕ */
        .habit-table .habit-name-cell {
            text-align: left;
            font-weight: 600;
            color: var(--color-text);
            position: sticky;
            left: 0;
            background: var(--color-bg-alt);
            z-index: 10;
            border-right: 2px solid var(--color-border);
            min-width: 150px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .habit-table thead th:first-child {
            position: sticky;
            left: 0;
            background: var(--color-primary);
            z-index: 20;
            border-right: 2px solid var(--color-border);
        }
        
        .habit-table tr:hover .habit-name-cell {
            background: var(--color-bg-alt);
        }
        
        .habit-check {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--color-secondary);
        }
        
        .empty-state { color: var(--color-text-light); background: var(--color-primary-light); border: 2px dashed var(--color-border); padding: 30px; border-radius: var(--radius-lg); text-align: center; font-weight: 500; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(198, 61, 77, 0.5); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: var(--radius-xl); padding: 30px; width: 100%; max-width: 550px; border: 2px solid var(--color-border); box-shadow: var(--shadow-lg); max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--color-border); }
        .modal-header h3 { color: var(--color-primary); font-weight: 700; margin: 0; font-size: 1.3em; }
        .close-modal { background: none; border: none; font-size: 1.6em; cursor: pointer; color: var(--color-primary); padding: 0; transition: var(--transition); }
        .close-modal:hover { color: var(--color-nav); background: var(--color-primary-light); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--color-primary); font-size: 0.9em; }
        
        .habit-input-group {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
        }
        .habit-input-group input[type="text"] {
            padding: 12px 16px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.95em;
            width: 100%;
        }
        .habit-input-group input[type="text"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(229, 155, 144, 0.2);
        }
        .habit-input-group select {
            padding: 12px 16px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.95em;
            min-width: 120px;
        }
        .habit-input-group .add-btn {
            padding: 12px 20px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2em;
            transition: var(--transition);
            min-width: 50px;
        }
        .habit-input-group .add-btn:hover {
            background: var(--color-primary-dark);
            transform: scale(1.05);
        }
        
        .custom-days-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .day-btn {
            padding: 8px 14px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: var(--transition);
        }
        .day-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        
        .habit-list-edit { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
        .habit-edit-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--color-bg); border-radius: var(--radius-md); }
        .habit-edit-item .habit-icon { font-size: 1.3em; }
        .habit-edit-item input { flex: 1; border: none; background: transparent; padding: 0; font-size: 0.95em; color: var(--color-text); }
        .habit-edit-item button { padding: 6px 12px; background: var(--color-primary); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8em; transition: var(--transition); }
        .habit-edit-item button:hover { background: var(--color-primary-dark); }
        .save-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-nav) 100%); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; transition: var(--transition); font-size: 1em; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        
        @media (max-width: 768px) { 
            .app-layout { flex-direction: column; } 
            .nav-frame { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 12px 16px; border-right: none; border-bottom: 2px solid var(--color-primary); } 
            .nav-section { flex-direction: row; gap: 8px; } 
            .nav-title { display: none; } 
            .nav-item { padding: 8px 12px; font-size: 0.85em; } 
            .content-area { margin-left: 0; padding: 16px; overflow-x: hidden; } 
            .date-range-selector { flex-direction: column; } 
            .habit-table { font-size: 0.75em; min-width: 600px; } 
            .stats-mini { grid-template-columns: 1fr; } 
            .habit-input-group { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <nav class="nav-frame">
            <div class="logo"><h1>📅 LifeDashboard</h1><p>Complete Productivity Suite</p></div>
            <div class="nav-section"><div class="nav-title">MAIN</div><a href="index.html" class="nav-item">🏠 Home</a><a href="day.html" class="nav-item">📆 Day Planner</a></div>
            <div class="nav-section"><div class="nav-title">PLANNING</div><a href="week.html" class="nav-item">📋 Week Planner</a><a href="month.html" class="nav-item">🗓️ Month Calendar</a><a href="year.html" class="nav-item">🎯 Year Goals</a></div>
            <div class="nav-section"><div class="nav-title">TRACKERS</div><a href="habits.html" class="nav-item active">🔥 Habit Tracker</a><a href="finance.html" class="nav-item">💰 Finance Tracker</a><a href="media.html" class="nav-item">📚🎬 Books & Movies</a><a href="study.html" class="nav-item">📚 Study Tasks</a><a href="pomodoro.html" class="nav-item">🍅 Pomodoro Timer</a></div>
        </nav>

        <div class="content-area">
            <div class="card">
                <h2>🔥 Habit Tracker</h2>
                
                <!-- Date Range -->
                <div class="date-range-selector">
                    <label>📅 Start:</label>
                    <input type="date" id="startDate">
                    <label>📅 End:</label>
                    <input type="date" id="endDate">
                    <button onclick="updateDateRange()">🔄 Update</button>
                </div>
                
                <!-- Mini Stats -->
                <div class="stats-mini" id="statsMini"></div>
                
                <!-- Action Button -->
                <div class="habit-actions-bar">
                    <button class="action-btn action-btn-primary" onclick="openHabitSettings()">
                        <span>⚙️</span>
                        <span>Manage Habits</span>
                    </button>
                </div>
                
                <!-- Habit Table (scroll only here, first column sticky) -->
                <div class="habit-table-container">
                    <table class="habit-table" id="habitTable">
                        <thead>
                            <tr id="tableHeader"><tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ Manage Habits</h3>
                <button class="close-modal" onclick="closeHabitSettings()">✖</button>
            </div>
            
            <!-- Add New Habit -->
            <div class="form-group">
                <label>Add New Habit</label>
                <div class="habit-input-group">
                    <input type="text" id="newHabitName" placeholder="Enter habit name (e.g., Drink 2L water)">
                    <select id="newHabitFrequency">
                        <option value="daily">Daily</option>
                        <option value="weekdays">Weekdays</option>
                        <option value="custom">Custom</option>
                    </select>
                    <button class="add-btn" onclick="addHabitFromSettings()" title="Add habit">+</button>
                </div>
                
                <!-- Custom days -->
                <div class="custom-days-group" id="customDaysGroup" style="display:none;">
                    <button type="button" class="day-btn" onclick="toggleDay(0)">Sun</button>
                    <button type="button" class="day-btn" onclick="toggleDay(1)">Mon</button>
                    <button type="button" class="day-btn" onclick="toggleDay(2)">Tue</button>
                    <button type="button" class="day-btn" onclick="toggleDay(3)">Wed</button>
                    <button type="button" class="day-btn" onclick="toggleDay(4)">Thu</button>
                    <button type="button" class="day-btn" onclick="toggleDay(5)">Fri</button>
                    <button type="button" class="day-btn" onclick="toggleDay(6)">Sat</button>
                </div>
            </div>
            
            <hr style="margin:20px 0;border:none;border-top:2px solid var(--color-border);">
            
            <!-- Existing Habits List -->
            <label style="font-weight:600;color:var(--color-primary);font-size:0.9em;display:block;margin-bottom:10px;">Your Habits (click ✖ to remove)</label>
            <div class="habit-list-edit" id="settingsHabitList"></div>
            
            <button class="save-btn" onclick="saveHabitSettings()">💾 Save & Close</button>
        </div>
    </div>

    <script>
        let habitsData = JSON.parse(localStorage.getItem('habitsData')) || { habits: [] };
        let selectedDays = [];
        let startDate, endDate;
        let firebaseReady = false;
        let db = null;
        let currentUser = null;
        
        const firebaseConfig = { 
            apiKey: "AIzaSyARKWwV3cggOhda9g6cDNcEAGOpUN4O63I", 
            authDomain: "lifedashbord.firebaseapp.com", 
            projectId: "lifedashbord", 
            storageBucket: "lifedashbord.appspot.com", 
            messagingSenderId: "206574362724", 
            appId: "1:206574362724:web:83887cae4dc87b41137f71" 
        };
        
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        document.addEventListener('DOMContentLoaded', function() {
            let savedStart = localStorage.getItem('habitStartDate');
            let savedEnd = localStorage.getItem('habitEndDate');
            if (savedStart && savedEnd) {
                startDate = new Date(savedStart);
                endDate = new Date(savedEnd);
            } else {
                const today = new Date();
                endDate = new Date(today);
                startDate = new Date(today);
                startDate.setDate(today.getDate() - 6);
            }
            
            initFirebase();
            
            document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('endDate').value = endDate.toISOString().split('T')[0];
            
            document.getElementById('newHabitFrequency')?.addEventListener('change', function() {
                const customGroup = document.getElementById('customDaysGroup');
                if (this.value === 'custom') {
                    customGroup.style.display = 'flex';
                } else {
                    customGroup.style.display = 'none';
                }
            });
            
            renderAll();
        });
        
        function initFirebase() {
            var firebaseTimeout = setTimeout(function() { firebaseReady = false; }, 5000);
            try {
                if (typeof firebase === 'undefined') { clearTimeout(firebaseTimeout); return; }
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                var auth = firebase.auth();
                auth.onAuthStateChanged(function(user) {
                    clearTimeout(firebaseTimeout);
                    if (user) { currentUser = user; firebaseReady = true; loadHabitsData(); }
                    else { firebaseReady = false; }
                });
            } catch (e) { clearTimeout(firebaseTimeout); firebaseReady = false; }
        }
        
        function loadHabitsData() {
            if (!currentUser || !db) return;
            db.collection('users').doc(currentUser.uid).collection('habits').doc('data').get().then(function(doc) {
                if (doc.exists) { 
                    habitsData = doc.data(); 
                    renderAll();
                    window.dispatchEvent(new Event('habitsUpdated'));
                }
            });
        }
        
        function saveHabitsData() {
            localStorage.setItem('habitsData', JSON.stringify(habitsData));
            window.dispatchEvent(new Event('habitsUpdated'));
            if (firebaseReady && currentUser && db) {
                db.collection('users').doc(currentUser.uid).collection('habits').doc('data').set(habitsData).catch(function() {});
            }
        }
        
        function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { return ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]); }); }
        function getDateKey(date) { return date.toISOString().split('T')[0]; }
        
        function getDatesInRange(start, end) {
            const dates = [];
            const current = new Date(start);
            const endDateObj = new Date(end);
            while (current <= endDateObj) {
                dates.push(new Date(current));
                current.setDate(current.getDate() + 1);
            }
            return dates;
        }
        
        function calculateStreak(habit) {
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() - i);
                const dateKey = checkDate.toISOString().split('T')[0];
                const dayOfWeek = checkDate.getDay();
                if (!habit.days.includes(dayOfWeek)) continue;
                if (habit.completed?.[dateKey]) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            return streak;
        }
        
        function renderAll() {
            renderStats();
            renderHabitTable();
        }
        
        function renderStats() {
            const grid = document.getElementById('statsMini');
            
            const totalHabits = habitsData.habits?.length || 0;
            const today = getDateKey(new Date());
            const todayDay = new Date().getDay();
            
            let completedToday = 0;
            let totalActiveToday = 0;
            let bestStreak = 0;
            
            habitsData.habits?.forEach(habit => {
                if (habit.days.includes(todayDay)) {
                    totalActiveToday++;
                    if (habit.completed?.[today]) completedToday++;
                }
                const streak = calculateStreak(habit);
                if (streak > bestStreak) bestStreak = streak;
            });
            
            grid.innerHTML = `
                <div class="stat-mini-card">
                    <div class="stat-mini-icon">🎯</div>
                    <div class="stat-mini-value">${totalHabits}</div>
                    <div class="stat-mini-label">Total Habits</div>
                </div>
                <div class="stat-mini-card">
                    <div class="stat-mini-icon">✅</div>
                    <div class="stat-mini-value">${completedToday}/${totalActiveToday}</div>
                    <div class="stat-mini-label">Today</div>
                </div>
                <div class="stat-mini-card">
                    <div class="stat-mini-icon">🔥</div>
                    <div class="stat-mini-value">${bestStreak}</div>
                    <div class="stat-mini-label">Best Streak</div>
                </div>
            `;
        }
        
        function renderHabitTable() {
            const headerRow = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            
            const dates = getDatesInRange(startDate, endDate);
            
            let headerHtml = '<th class="habit-name-cell">Habit</th>';
            dates.forEach(date => {
                const dayName = dayNames[date.getDay()];
                const dayNum = date.getDate();
                const month = date.toLocaleString('en-US', { month: 'short' });
                headerHtml += `<th>${dayName}<br><small>${dayNum} ${month}</small></th>`;
            });
            headerRow.innerHTML = headerHtml;
            
            tbody.innerHTML = '';
            if (!habitsData.habits || habitsData.habits.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + (dates.length + 1) + '" class="empty-state">No habits yet. Click "Manage Habits" to add your first habit!</td></tr>';
                return;
            }
            
            habitsData.habits.forEach(habit => {
                const tr = document.createElement('tr');
                let html = `<td class="habit-name-cell">${escapeHtml(habit.name)}</td>`;
                
                dates.forEach(date => {
                    const dateKey = getDateKey(date);
                    const dayOfWeek = date.getDay();
                    const isCompleted = habit.completed?.[dateKey] || false;
                    const isActive = habit.days.includes(dayOfWeek);
                    
                    if (isActive) {
                        html += `<td><input type="checkbox" class="habit-check ${isCompleted ? 'completed' : ''}" ${isCompleted ? 'checked' : ''} onchange="toggleHabitDate('${habit.id}', '${dateKey}', this.checked)"></td>`;
                    } else {
                        html += `<td style="background:var(--color-bg);opacity:0.5;">-</td>`;
                    }
                });
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }
        
        window.updateDateRange = function() {
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            
            if (!startVal || !endVal) { return; }
            
            startDate = new Date(startVal);
            endDate = new Date(endVal);
            
            if (startDate > endDate) { return; }
            
            localStorage.setItem('habitStartDate', startVal);
            localStorage.setItem('habitEndDate', endVal);
            
            renderHabitTable();
            renderStats();
        };
        
        window.toggleHabitDate = function(habitId, dateKey, completed) {
            const habit = habitsData.habits.find(h => h.id === habitId);
            if (!habit) return;
            if (!habit.completed) habit.completed = {};
            habit.completed[dateKey] = completed;
            habit.streak = calculateStreak(habit);
            saveHabitsData();
            renderStats();
        };
        
        window.openHabitSettings = function() {
            selectedDays = [];
            document.getElementById('newHabitName').value = '';
            document.getElementById('newHabitFrequency').value = 'daily';
            document.getElementById('customDaysGroup').style.display = 'none';
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            renderSettingsList();
            document.getElementById('settingsModal').classList.add('active');
        };
        
        window.closeHabitSettings = function() {
            document.getElementById('settingsModal').classList.remove('active');
        };
        
        window.toggleDay = function(dayIdx) {
            const idx = selectedDays.indexOf(dayIdx);
            const buttons = document.querySelectorAll('.day-btn');
            
            if (idx === -1) {
                selectedDays.push(dayIdx);
                buttons[dayIdx].classList.add('active');
            } else {
                selectedDays.splice(idx, 1);
                buttons[dayIdx].classList.remove('active');
            }
        };
        
        window.addHabitFromSettings = function() {
            const name = document.getElementById('newHabitName').value.trim();
            const frequency = document.getElementById('newHabitFrequency').value;
            
            if (!name) { return; }
            
            let days = [];
            if (frequency === 'daily') {
                days = [0,1,2,3,4,5,6];
            } else if (frequency === 'weekdays') {
                days = [1,2,3,4,5];
            } else {
                days = selectedDays.length > 0 ? selectedDays : [0,1,2,3,4,5,6];
            }
            
            const newHabit = {
                id: generateId(),
                name: name,
                frequency: frequency,
                days: days,
                completed: {},
                streak: 0
            };
            
            if (!habitsData.habits) habitsData.habits = [];
            habitsData.habits.push(newHabit);
            
            renderSettingsList();
            
            document.getElementById('newHabitName').value = '';
            selectedDays = [];
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
        };
        
        function renderSettingsList() {
            const container = document.getElementById('settingsHabitList');
            container.innerHTML = '';
            
            if (!habitsData.habits || habitsData.habits.length === 0) {
                container.innerHTML = '<p style="color:var(--color-text-light);text-align:center;padding:20px;">No habits yet. Add your first habit above!</p>';
                return;
            }
            
            habitsData.habits.forEach((habit, idx) => {
                const div = document.createElement('div');
                div.className = 'habit-edit-item';
                div.innerHTML = `
                    <span class="habit-icon">🎯</span>
                    <input type="text" value="${escapeHtml(habit.name)}" readonly>
                    <button onclick="deleteHabitFromSettings(${idx})" title="Remove">✖</button>
                `;
                container.appendChild(div);
            });
        }
        
        window.deleteHabitFromSettings = function(idx) {
            habitsData.habits.splice(idx, 1);
            renderSettingsList();
        };
        
        window.saveHabitSettings = function() {
            saveHabitsData();
            renderAll();
            closeHabitSettings();
        };
        
        window.addEventListener('storage', function(e) {
            if (e.key === 'habitsData') {
                habitsData = JSON.parse(e.newValue);
                renderAll();
            }
        });
        
        window.addEventListener('habitsUpdated', function() {
            habitsData = JSON.parse(localStorage.getItem('habitsData')) || { habits: [] };
            renderAll();
        });
    </script>
</body>
</html>
